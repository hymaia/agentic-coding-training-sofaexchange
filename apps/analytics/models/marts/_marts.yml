version: 2

models:
  - name: sofas
    description: "One row per sofa listing, enriched with multilingual city names."
    columns:
      - name: id
        tests: [not_null, unique]
      - name: title
        tests: [not_null]
      - name: city_key
        tests: [not_null]
      - name: city_en
        tests: [not_null]
      - name: city_fr
        tests: [not_null]
      - name: city_it
        tests: [not_null]
      - name: country_code
        tests: [not_null]
      - name: price_per_night_eur
        tests: [not_null]
      - name: sofa_type
        tests: [not_null]
      - name: has_free_wifi
        tests: [not_null]
