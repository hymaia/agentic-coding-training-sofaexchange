version: 2

models:
  - name: sofas_by_city
    description: "Number of sofas and average price per city, with multilingual city names."
    columns:
      - name: city_key
        tests: [not_null, unique]
      - name: city_en
        tests: [not_null]
      - name: city_fr
        tests: [not_null]
      - name: city_it
        tests: [not_null]
      - name: country_code
        tests: [not_null]
      - name: sofa_count
        tests: [not_null]
      - name: avg_price_eur
        tests: [not_null]

  - name: sofas_by_sofa_type
    description: "Number of sofas and average price per sofa type."
    columns:
      - name: sofa_type
        tests: [not_null, unique]
      - name: sofa_count
        tests: [not_null]
      - name: avg_price_eur
        tests: [not_null]
